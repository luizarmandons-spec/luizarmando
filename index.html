<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luiz Armando</title>
<link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
<link rel="icon" sizes="32x32" href="favicon/favicon-32x32.png" />
<link rel="icon" sizes="16x16" href="favicon/favicon-16x16.png" />
<link rel="android-chrome-192x192" sizes="192x192" href="favicon/android-chrome-192x192.png" />
<link rel="android-chrome-512x512" sizes="512x512" href="favicon/android-chrome-512x512.png" />
  
<style>
body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background: #f5f5f7;
color: #1d1d1f;
}

/* NAVBAR */
header {
display: flex;
justify-content: center;
gap: 40px;
padding: 20px 100px;
backdrop-filter: blur(25px);
position: sticky;
top: 0;
z-index: 100;
overflow-x: auto;
white-space: nowrap;
scrollbar-width: none;
}

header:-webkit-scrollbar {
display: none;
}

header a {
text-decoration: none;
color: #6e6e73;
font-size: 16px;
cursor: pointer;
}

/* HERO */
.hero {
text-align: center;
padding: 0px;
}

.hero h1 {
font-size: 40px;
margin: 0;
}

.hero p {
font-size: 30px;
color: #6e6e73;
margin: 0;
padding-top: 20px;
}

.hero h1, .hero p,
.section h2, .section p {
margin: 0;
}

/* SEÇÕES */
.section {
padding: 0px;
text-align: center;
}

.section h2 {
font-size: 30px;
margin: 0;
padding-bottom: 20px;
}

.section p {
color: #6e6e73;
font-size: 20px;
margin: 0;
}

.section o {
color: #6e6e73;
margin: 0;
}

/* CAIXAS DA APPLE */
.links-rapidos {
  padding: 40px;
  background: #f5f5f7;
}

.links-rapidos h2 {
  margin-bottom: 20px;
}

.botoes {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.botoes a {
  text-decoration: none;
  padding: 10px 30px;
  color: #fff;
  border-radius: 25px;
  background: #007AFF;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  transition: 0.3s;
}

/* hover */
.botoes a:hover {
  background: #e5e5e7;
  transform: scale(1.03);
}

/* botão ativo (selecionado) */
.botoes a.ativo {
  background: #1d1d1f;
  color: white;
  border-color: #1d1d1f;
}

.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center; /* centraliza vertical */
    align-items: center;     /* centraliza horizontal */
    gap: 20px;               /* espaço entre elementos */
}

/* CARDS estilo Apple */
.cards {
display: flex;
gap: 20px;
overflow-x: auto;
flex-wrap: wrap;
justify-content: flex-start;
}

.card {
min-width: 280px;
background: white;
border-radius: 20px;
padding: 30px;
box-shadow: 0 4px 20px rgba(0,0,0,0.05);
text-align: left;
transition: 0.3s;
}

.card:hover {
transform: scale(1.03);
}

.card h3 {
margin-top: 0;
font-size: 20px;
}

.card a {
display: inline-block;
margin-top: 0;
color: #007aff;
text-decoration: none;
}

/* AJUSTE MOBILE - Apenas para o respiro lateral */
@media (max-width: 768px) {
    header {
        padding: 20px; 
        gap: 20px;
        justify-content: center;
        overflow-x: auto;
    }

    .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center; /* centraliza vertical */
    align-items: center;     /* centraliza horizontal */
    gap: 20px;               /* espaço entre elementos */
    }

    .hero {
        padding: 0px;    
    }

    .section {
        padding: 0px; /* Reduz de 100px para 20px apenas para o texto não colar na borda */
    }

    /* Garante que o card não seja maior que a tela do celular */
    .card {
        max-width: 100%; 
    }
}

/* BOTÃO */
.btn {
background: #0071e3;
color: white;
padding: 10px 20px;
border-radius: 20px;
border: none;
cursor: pointer;
margin-top: 10px;
}

/* EXERCÍCIO */
input {
padding: 10px;
border-radius: 10px;
border: 1px solid #ccc;
}

/* DARK MODE */
@media (prefers-color-scheme: dark) {
body {
background: #000;
color: white;
}
.card {
background: #1c1c1e;
}
header {
background: rgba(0,0,0,0.7);
}
.links-rapidos {
    background: #111;
}
.botoes a {
color: black;
background: white;
border-color: #444;
}
.botoes a:hover {
background: #222;
}
.botoes a.ativo {
background: white;
color: black;
}
}
</style>

</head>

<div class="container">

<body>

<!-- INÍCIO -->
<section id="início" class="hero">
<h1>Explore</h1>
</section>

<section class="botoes">
<a href="" class="cinema">Cinema</a>
<a href="exatas.html" class="exatas">Exatas</a>
<a href="fotografia.html" class="fotografia">Fotografia</a>
<a href="pinturas.html" class="pinturas">Pinturas</a>
<a href="" class="poemas">Poemas</a>
<a href="" class="taro">Tarô</a>
</section>

</script>

</div>

</body>
</html>
